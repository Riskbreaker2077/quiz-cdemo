<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Curso Aprendizaje Móvil — Ciudad Dorada</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Library scripts -->
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app-screens.jsx"></script>
<script type="text/babel" src="app-modules.jsx"></script>
<script type="text/babel" src="app-finale.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "teacherName": "Carolina Patiño Cuellar",
  "schoolName": "Ciudad Dorada",
  "schoolLogo": "assets/escudo-ciudad-dorada.jpeg",
  "primaryColor": "#a855f7",
  "accentColor": "#39ff14"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [block, setBlock] = React.useState(1);
  const [state, setState] = React.useState({
    groupName: "",
    badges: [false, false, false], // [b6, b7, b8]
    b6Seen: [false, false, false, false],
    b7Done: false,
    qrFound: Array(10).fill(false),
  });

  const fullState = { ...state, block };

  const go = (n) => {
    setBlock(n);
    // scroll to top of screen body
    requestAnimationFrame(() => {
      const sb = document.querySelector(".screen-body");
      if (sb) sb.scrollTop = 0;
    });
  };

  let currentScreen;
  switch (block) {
    case 1: currentScreen = <Block1Title go={go} tweaks={tweaks} />; break;
    case 2: currentScreen = <Block2Intro go={go} />; break;
    case 3: currentScreen = <Block3Group go={go} state={state} setState={setState} />; break;
    case 4: currentScreen = <Block4Explanation go={go} state={state} />; break;
    case 5: currentScreen = <Block5Hub go={go} state={state} />; break;
    case 6: currentScreen = <Block6Content go={go} state={state} setState={setState} />; break;
    case 7: currentScreen = <Block7Training go={go} state={state} setState={setState} />; break;
    case 8: currentScreen = <Block8Journey go={go} state={state} setState={setState} />; break;
    case 9: currentScreen = <Block9Finale go={go} state={state} setState={setState} />; break;
    default: currentScreen = <Block1Title go={go} tweaks={tweaks} />;
  }

  return (
    <div className="stage" data-screen-label={`0${block} Bloque ${block}`}>
      <div className="stage-title">
        ▌ APRENDIZAJE MÓVIL · CIUDAD DORADA ▐
      </div>

      <IOSDevice width={390} height={780} dark={true}>
        <div className="screen">
          <AppTopbar state={fullState} />
          {currentScreen}
        </div>
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Identidad">
          <TweakText label="Profesora" value={tweaks.teacherName} onChange={(v) => setTweak("teacherName", v)} />
          <TweakText label="Colegio" value={tweaks.schoolName} onChange={(v) => setTweak("schoolName", v)} />
          <TweakText label="Logo (URL)" value={tweaks.schoolLogo || ""} onChange={(v) => setTweak("schoolLogo", v)} />
        </TweakSection>
        <TweakSection title="Navegación">
          <TweakSelect
            label="Saltar al bloque"
            value={String(block)}
            onChange={(v) => go(Number(v))}
            options={[
              { value: "1", label: "01 · Título" },
              { value: "2", label: "02 · Intro" },
              { value: "3", label: "03 · Grupo" },
              { value: "4", label: "04 · Explicación" },
              { value: "5", label: "05 · Mapa (puente)" },
              { value: "6", label: "06 · Contenido" },
              { value: "7", label: "07 · Entrenamiento" },
              { value: "8", label: "08 · Viaje" },
              { value: "9", label: "09 · Final" },
            ]}
          />
          <TweakButton label="Reset progreso" onClick={() => {
            setState({
              groupName: "",
              badges: [false, false, false],
              b6Seen: [false, false, false, false],
              b7Done: false,
              qrFound: Array(10).fill(false),
            });
            go(1);
          }} />
          <TweakButton label="Otorgar todas las insignias" onClick={() => {
            setState(s => ({ ...s, badges: [true, true, true] }));
          }} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
